<body>

&#10094;

&#10095;
</button>

</div>

<script>

const slides = [

{
image:"images/coverart/1.jpg",
spotify:"https://open.spotify.com/track/3sh2q76qsc7yLkQNmHKfQf?si=a2a1964945474283"
},

{
image:"images/coverart/2.jpg",
spotify:"https://open.spotify.com/track/6w9IOQBGiQOjv1J1YWhM3i?si=eb6fe1bb98374b8a"
},

{
image:"images/coverart/3.jpg",
spotify:"https://open.spotify.com/track/6bIvgjuhHG2tNldfu6WTZE?si=88140321903e4783"
},

{
image:"images/coverart/4.jpg",
spotify:"https://open.spotify.com/track/2vFabIc6h3F6GiZCsxq8zw?si=234e9d38064b41b0"
},

{
image:"images/coverart/5.jpg",
spotify:"https://open.spotify.com/track/7jhZ9ObYAmlHSoP6w6xB9g?si=b6a7a36a6a3c44ab"
},


];

let current = 0;

function updateSlide(){

document.getElementById("slideshow-image").src = slides[current].image;
document.getElementById("spotify-link").href = slides[current].spotify;

}

function changeSlide(direction){

current += direction;

if(current < 0){
current = slides.length - 1;
}

if(current >= slides.length){
current = 0;
}

updateSlide();

}

updateSlide();

</script>
